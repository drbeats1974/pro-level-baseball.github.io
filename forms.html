<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .form-card h2 {
            margin-top: 0;
        }

        .form-button {
            display: inline-block;
            background: #1a73e8;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
        }

        .form-button:hover {
            background: #0c5dc0;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Required Forms</h1>

    <div class="form-card">
        <h2>Parent/Guardian Consent Form</h2>
        <a class="form-button" target="_blank"
        href="https://docs.google.com/forms/d/e/1FAIpQLSfy65Y0v9QtUk2LqngsWA_21BQCtzH1KABcFqSye1t6F-7Ljw/viewform?usp=dialog">
        Open Form
        </a>
    </div>

    <div class="form-card">
        <h2>Emergency Contact Form</h2>
        <a class="form-button" target="_blank"
        href="https://docs.google.com/forms/d/e/1FAIpQLSe2MiIevGNET55cRyDX6EsTfrooHCET1YXkfgJKXWWAsVBcPQ/viewform?usp=dialog">
        Open Form
        </a>
    </div>

    <div class="form-card">
        <h2>Liability Waiver Form</h2>
        <a class="form-button" target="_blank"
        href="https://docs.google.com/forms/d/e/1FAIpQLSdxzpNpc2Gkarzvl9mttUPdagl7yrCmyaZBNBJ10RF3bqMiGg/viewform?usp=dialog">
        Open Form
        </a>
    </div>

    <div class="form-card">
        <h2>Student Athlete Application Form</h2>
        <a class="form-button" target="_blank"
        href="https://docs.google.com/forms/d/e/1FAIpQLSfR_z8tE64ocnGG7kBwE0Ha7G2R4GciDTW0x0ys65LxFG56mg/viewform?usp=dialog">
        Open Form
        </a>
    </div>

    <div class="form-card">
        <h2>Photo and Media Release Form</h2>
        <a class="form-button" target="_blank"
        href="https://docs.google.com/forms/d/e/1FAIpQLSccIgWS0QT5vQ4SSJEz_u-zvXpPGFxgblOyBayA-TJfSaVClQ/viewform?usp=dialog">
        Open Form
        </a>
    </div>

</div>

</body>
</html>
